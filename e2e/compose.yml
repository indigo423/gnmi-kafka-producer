# SPDX-License-Identifier: Apache-2.0
name: gnmi-kafka-demo

networks:
  demo-net:
    driver: bridge
    # Fixed subnet so nl6 can hold a static address: the gateway's return
    # route to the simulated devices (see gateway-route) needs a stable
    # next-hop, and routes can't use DNS names.
    ipam:
      config:
        - subnet: 172.28.0.0/24

services:
  nl6:
    image: ghcr.io/labmonkeys-space/nl6:latest
    container_name: nl6
    hostname: nl6
    # nl6 puts each simulated device on its own IP inside a TUN/netns, so it
    # needs these caps and the tun device. Devices dial OUT from there to the
    # gateway's gNMIReverse listener — nobody dials in, so nothing shares this
    # namespace.
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun
    # Auto-create 3 devices at 192.168.100.1..3, pushing dial-out telemetry
    # (Arista gNMIReverse, SAMPLE over the full state subtree every 5s,
    # plaintext) to the gateway. Each device still serves dial-in on :9339.
    command:
      [
        "-auto-start-ip", "192.168.100.1",
        "-auto-count", "3",
        "-gnmi-mode", "dial-out",
        "-gnmi-dialout-collector", "gateway:57400",
        "-gnmi-dialout-sub-mode", "sample",
        "-gnmi-dialout-interval", "5s",
        "-gnmi-dialout-tls=false",
      ]
    networks:
      demo-net:
        # Static: next-hop of the gateway's return route (gateway-route below).
        ipv4_address: 172.28.0.10
    # nl6 resolves the collector hostname at startup and exits (fatal) if it
    # doesn't resolve, so wait until the gateway is on the network. restart:
    # unless-stopped below covers stragglers either way.
    depends_on:
      gateway:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/version >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka
    hostname: kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    networks: [demo-net]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 20s
      retries: 20
      start_period: 30s

  gateway:
    build:
      context: ..
      dockerfile: cmd/gateway/Dockerfile
    container_name: gateway
    # An ordinary service: nl6's devices dial out TO the gateway (gNMIReverse
    # on :57400, in-network only), so the gateway no longer shares nl6's netns
    # and publishes its own metrics port. No nl6 dependency either — devices
    # reconnect with backoff until the listener is up.
    depends_on:
      kafka:
        condition: service_healthy
    networks: [demo-net]
    # Override the host side if :9090 is taken (e.g. a local Prometheus):
    #   GATEWAY_METRICS_HOST_PORT=19090 make up
    ports:
      - "${GATEWAY_METRICS_HOST_PORT:-9090}:9090"
    volumes:
      - ../configs/gateway.yaml:/etc/gnmi-kafka/gateway.yaml:ro
    restart: unless-stopped

  # Keeps the gateway's return route to the simulated devices installed. nl6
  # forwards device traffic without SNAT, so dial-out TCP arrives sourced from
  # 192.168.100.x and replies must route back via nl6's static address. The
  # gateway image is distroless (no shell, nonroot), so a sidecar joins the
  # gateway's netns and holds the route (`ip route replace` is idempotent).
  # A gateway restart tears down that netns and gives the gateway a fresh one;
  # this sidecar stays bound to the dead namespace (it sees no eth0), so it
  # exits, and restart: unless-stopped brings it back attached to the new
  # gateway netns — the route follows the gateway across restarts.
  gateway-route:
    image: alpine:3.21
    container_name: gateway-route
    network_mode: "service:gateway"
    cap_add:
      - NET_ADMIN
    depends_on:
      gateway:
        condition: service_started
    command:
      - sh
      - -c
      - "while ip link show eth0 >/dev/null 2>&1; do ip route replace 192.168.100.0/24 via 172.28.0.10; sleep 5; done; echo 'gateway netns gone; exiting to re-attach'; exit 1"
    restart: unless-stopped

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: "demo"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "8080:8080"
    networks: [demo-net]

  # Bridges gnmi.telemetry into Prometheus: consumes the merged JSON records
  # and serves their last-known state as gauges on :9108 (scraped in-net).
  exporter:
    build:
      context: ..
      dockerfile: cmd/exporter/Dockerfile
    container_name: exporter
    depends_on:
      kafka:
        condition: service_healthy
    networks: [demo-net]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    # Host 9090 already publishes the gateway's metrics, so the Prometheus UI
    # defaults to 9091: PROMETHEUS_HOST_PORT=19091 make up
    ports:
      - "${PROMETHEUS_HOST_PORT:-9091}:9090"
    networks: [demo-net]

  grafana:
    image: grafana/grafana:13.1.0
    container_name: grafana
    depends_on:
      prometheus:
        condition: service_started
    environment:
      # Demo convenience: no login wall.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks: [demo-net]
