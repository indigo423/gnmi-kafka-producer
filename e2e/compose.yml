name: gnmi-kafka-demo

networks:
  demo-net:
    driver: bridge

services:
  nl6:
    image: ghcr.io/labmonkeys-space/nl6:latest
    container_name: nl6
    hostname: nl6
    # nl6 puts each simulated device on its own IP inside a TUN/netns, so it
    # needs these caps and the tun device. The gateway joins this namespace
    # (network_mode below) to reach the per-device gNMI endpoints.
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun
    # Auto-create 3 devices at 192.168.100.1..3; each exposes gNMI on :9339.
    command: ["-auto-start-ip", "192.168.100.1", "-auto-count", "3"]
    networks: [demo-net]
    # The gateway shares this netns (network_mode below) and cannot publish
    # ports of its own, so its Prometheus metrics port is published here.
    # Override the host side if :9090 is taken (e.g. a local Prometheus):
    #   GATEWAY_METRICS_HOST_PORT=19090 make up
    ports:
      - "${GATEWAY_METRICS_HOST_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/version >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
    # If nl6 restarts it gets a fresh netns; keep it running so the gateway,
    # which shares this namespace, can recover.
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka
    hostname: kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    networks: [demo-net]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 20s
      retries: 20
      start_period: 30s

  gateway:
    build:
      context: ..
      dockerfile: cmd/gateway/Dockerfile
    container_name: gateway
    # Share nl6's network namespace so the gateway can dial the per-device TUN
    # IPs (192.168.100.x:9339). Kafka is still reachable because nl6 is on
    # demo-net. A service using network_mode cannot also declare `networks:`.
    network_mode: "service:nl6"
    depends_on:
      nl6:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ../configs/gateway.yaml:/etc/gnmi-kafka/gateway.yaml:ro
    restart: unless-stopped

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: "demo"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "8080:8080"
    networks: [demo-net]

  grafana:
    image: grafana/grafana:13.1.0
    container_name: grafana
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      # Backend Kafka datasource plugin (pinned); the version follows the plugin id.
      GF_INSTALL_PLUGINS: "hamedkarbasi93-kafka-datasource 1.6.0"
      # Demo convenience: no login wall.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks: [demo-net]
