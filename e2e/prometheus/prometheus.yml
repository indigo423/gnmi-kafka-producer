# Prometheus for the demo stack: scrapes the Kafka→Prometheus exporter (the
# telemetry itself) and the gateway's own operational metrics.
global:
  scrape_interval: 5s # match nl6's 5s dial-out sample interval

scrape_configs:
  - job_name: telemetry
    static_configs:
      - targets: ["exporter:9108"]
  - job_name: gateway
    static_configs:
      - targets: ["gateway:9090"]
