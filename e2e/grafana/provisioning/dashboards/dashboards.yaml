# Loads dashboard JSON files from the mounted dashboards directory.
apiVersion: 1

providers:
  - name: gnmi
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
