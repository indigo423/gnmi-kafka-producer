# Provisions the Prometheus datasource so the dashboard works on first start.
apiVersion: 1

# Drop the Kafka datasource left behind by pre-Prometheus versions of this
# stack (harmless when absent).
deleteDatasources:
  - name: Kafka
    orgId: 1

datasources:
  - name: Prometheus
    uid: prom-gnmi
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 5s
