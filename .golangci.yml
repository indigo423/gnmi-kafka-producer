version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam
  exclusions:
    rules:
      # Keep revive's checks, but don't require godoc comments on every
      # exported symbol / package — the codebase intentionally omits them.
      - linters: [revive]
        text: '^(exported|package-comments):'

formatters:
  enable:
    - gofmt
    - goimports
