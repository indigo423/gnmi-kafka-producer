# gateway config — gNMI subscriber that produces JSON records to Kafka.
# In k8s this is the contents of a ConfigMap mounted into the gateway Deployment.

kafka:
  brokers: ["kafka:9092"]
  topic: gnmi.telemetry

# Shared gNMI dial settings, applied to every host.
# nl6 requires no authentication and serves gNMI over TLS on port 9339.
gnmi:
  port: 9339
  username: ""             # nl6 has no auth
  password: ""
  skip_verify: true        # TLS with no cert verification (nl6 uses a self-signed cert)
  insecure: false          # set true to use plaintext gNMI instead of TLS
  encoding: json_ietf
  dial_timeout: 10s

# Named subscription profiles. Every host subscribes to every profile over one
# gNMI Subscribe stream; each profile's paths use its mode and intervals.
# SAMPLE requires sample_interval; ON_CHANGE fires on state transitions, with
# heartbeat_interval forcing a resend when a leaf stays quiet. Overlapping or
# duplicate paths across profiles are rejected at startup (oversubscription).
# nl6 exposes the OpenConfig interfaces model (read-only). Fuller leaf list at
# https://nl6.eu (gNMI reference): ifindex, last-change, and the full counters/*
# set (unicast/multicast/broadcast pkts, discards, errors) are also available.
subscription_profiles:
  interface-counters:
    mode: SAMPLE
    sample_interval: 5s
    paths:
      - /interfaces/interface[name=*]/state/counters/in-octets
      - /interfaces/interface[name=*]/state/counters/out-octets
  interface-status:
    mode: ON_CHANGE
    heartbeat_interval: 5m
    paths:
      - /interfaces/interface[name=*]/state/admin-status
      - /interfaces/interface[name=*]/state/oper-status

# Hosts to poll. Address only — port comes from gnmi.port above (override
# inline by writing "host:port"). Hosts are dialed concurrently. These are nl6's
# auto-created per-device TUN IPs, reachable because the gateway shares nl6's
# network namespace (see e2e/compose.yml).
hosts:
  - 192.168.100.1
  # - 192.168.100.2
  # - 192.168.100.3
